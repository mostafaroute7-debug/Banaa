<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>تسجيل الدخول</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="login-page">

        <img src="images/icons/logo.svg" class="logo" alt="Logo">

        <div class="login-card">

            <h2 class="title">
                تسجيل لوحة التحكم نظام بناء
            </h2>

            <form>

                <div class="mb-4">
                    <label class="form-label">
                        اسم المستخدم
                    </label>

                    <input type="text" class="form-control" placeholder="ادخل اسم المستخدم">
                </div>

                <div class="mb-4">

                    <label class="form-label">
                        كلمة السر
                    </label>

                    <div class="position-relative">

                        <input type="password" id="password" class="form-control password-input"
                            placeholder="ادخل كلمة السر">

                        <i class="bi bi-eye icon-left" id="togglePassword"></i>

                        <i class="bi bi-lock icon-right"></i>

                    </div>

                </div>

                <button class="btn login-btn w-100">
                    سجل الآن
                    <i class="bi bi-chevron-left"></i>
                </button>

            </form>

            <p class="footer-text">
                منصة فحص المساكن المبني - وزارة الشؤون البلدية
            </p>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
